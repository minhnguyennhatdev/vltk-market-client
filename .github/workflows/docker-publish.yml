name: Docker Build And Publish

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          IMAGE_REPO="ghcr.io/${GITHUB_REPOSITORY,,}"
          REF_SLUG="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9_.-]#-#g')"
          API_URL="${{ vars.NEXT_PUBLIC_API_URL }}"
          if [ -z "$API_URL" ]; then
            API_URL="http://localhost:3000"
          fi

          echo "image_repo=$IMAGE_REPO" >> "$GITHUB_OUTPUT"
          echo "ref_slug=$REF_SLUG" >> "$GITHUB_OUTPUT"
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image (sha + branch)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image_repo }}:${{ github.sha }}
            ${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.ref_slug }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.meta.outputs.api_url }}

      - name: Tag and push latest (default branch)
        if: github.ref_name == github.event.repository.default_branch
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image_repo }}:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.meta.outputs.api_url }}
