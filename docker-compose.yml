services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: vltk-market-client:latest
    container_name: vltk-market-client
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      NODE_ENV: production
    restart: unless-stopped
