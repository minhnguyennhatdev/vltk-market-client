version: "3.9"

networks:
  internal_network:
    driver: overlay

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: vltk_market_client:latest
    container_name: vltk_market_client
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      NODE_ENV: production
    restart: unless-stopped
    networks:
      - internal_network
