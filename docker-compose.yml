networks:
  internal_network:
    driver: overlay

services:
  web:
    image: ${IMAGE_NAME:-ghcr.io/world-event/postgres/vltk_market_client:latest}
    container_name: vltk_market_client
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      NODE_ENV: production
    restart: unless-stopped
    networks:
      - internal_network
