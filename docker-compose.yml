version: "3.9"

networks:
    vltk_market_client_network:
        name: vltk_market_client_network
        driver: bridge

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: vltk_market_client:latest
    container_name: vltk_market_client
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      NODE_ENV: production
    restart: unless-stopped
    networks:
      - vltk_market_client_network